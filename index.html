
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Odisha Junior Teacher Prep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Oriya:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
        }
        
        body {
            font-family: 'Inter', sans-serif;
        }
        
        .odia-font {
            font-family: 'Noto Sans Oriya', sans-serif;
        }

        /* 3D Flashcard styles */
        .transform-style-3d {
            transform-style: preserve-3d;
        }
        .backface-hidden {
            backface-visibility: hidden;
        }
        .rotate-y-180 {
            transform: rotateY(180deg);
        }

        /* Fixed PDF Container - Must be visible to renderer but off-screen */
        #pdf-export-container {
            width: 750px; 
            position: absolute;
            left: -10000px;
            top: 0;
            background: white;
            color: black;
            padding: 40px;
            font-family: 'Inter', sans-serif;
        }

        .pdf-question-card {
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 24px;
            margin-bottom: 24px;
            page-break-inside: avoid;
            background: #ffffff;
            display: block;
        }

        .pdf-header {
            border: 2px solid #1e293b;
            padding: 24px;
            margin-bottom: 30px;
            text-align: center;
            border-radius: 6px;
        }

        /* Custom scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        
        /* Glassmorphism preparation bar */
        .glass-prep {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
        }

        @media print {
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>
    <!-- Hidden but rendered container for PDF snapshots -->
    <div id="pdf-export-container"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
